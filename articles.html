<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راز زکریا | مقالات علمی و پژوهشی</title>
    <!-- بارگذاری فونت استاندارد وزیر و گوگل فونت -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* استایل‌های اختصاصی صفحه مقالات */
        
        .page-header {
            background: linear-gradient(135deg, var(--navy), var(--dark-navy));
            color: var(--white);
            padding: 60px 8%;
            text-align: center;
            position: relative;
        }

        .page-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .search-filter-container {
            max-width: 900px;
            margin: -30px auto 40px auto;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
            border: 1px solid #eee;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: var(--font-fa);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(72, 199, 207, 0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: #f0f4f5;
            color: #555;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font-fa);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--teal);
            color: var(--white);
        }

        .articles-wrapper {
            padding: 40px 8%;
            min-height: 50vh;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .article-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid #eee;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(11, 90, 106, 0.1);
            border-color: rgba(72, 199, 207, 0.4);
        }

        .card-image-box {
            height: 200px;
            background: var(--navy);
            position: relative;
            overflow: hidden;
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .article-card:hover .card-image-box img {
            transform: scale(1.05);
        }

        .category-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(11, 90, 106, 0.9);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-body h3 {
            font-size: 1.3rem;
            color: var(--navy);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-body p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 20px;
            flex-grow: 1;
            text-align: justify;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f5f5f5;
            padding-top: 15px;
        }

        .card-date {
            font-size: 0.85rem;
            color: #999;
        }

        .read-more-link {
            color: var(--teal);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .read-more-link:hover {
            color: var(--navy);
        }

        /* رسپانسیو */
        @media (max-width: 768px) {
            .search-filter-container {
                flex-direction: column;
            }
            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>

    <!-- هدر سایت -->
    <header>
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="لوگو راز زکریا" onerror="this.style.display='none'">
            <span>راز زکریا</span>
        </a>
        <nav>
            <ul>
                <li><a href="index.html">خانه</a></li>
                <li><a href="articles.html" class="active">مقالات علمی</a></li>
                <li><a href="about.html">درباره رازی</a></li>
            </ul>
        </nav>
    </header>

    <!-- سربرگ صفحه مقالات -->
    <section class="page-header">
        <h1 class="page-title">مقالات و پژوهش‌های علمی</h1>
        <p>بایگانی مقالات ترجمه شده و تحلیل‌های تاریخی پیرامون دستاوردهای شیمی و کیمیاگری کهن</p>
    </section>

    <!-- نوار جستجو و فیلترها -->
    <div class="search-filter-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجو در عنوان یا متن مقالات...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-category="all">همه</button>
            <button class="filter-btn" data-category="chemistry">شیمی و کیمیا</button>
            <button class="filter-btn" data-category="medicine">پزشکی و داروسازی</button>
            <button class="filter-btn" data-category="history">تاریخ علم</button>
        </div>
    </div>

    <!-- لیست مقالات -->
    <section class="articles-wrapper">
        <div class="articles-grid" id="articlesGrid">

    <!-- فوتر -->
    <footer>
        <p>© ۱۴۰۵ راز زکریا. تمامی حقوق این وب‌سایت محفوظ است.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // منطق تعاملی فیلتر و جستجوی مقالات در صفحه
        document.addEventListener("DOMContentLoaded", () => {
            const filterButtons = document.querySelectorAll(".filter-btn");
            const searchInput = document.getElementById("searchInput");
            const articles = document.querySelectorAll(".article-card");

            function filterArticles() {
                const query = searchInput.value.toLowerCase().trim();
                const activeCategory = document.querySelector(".filter-btn.active").getAttribute("data-category");

                articles.forEach(article => {
                    const title = article.querySelector("h3").textContent.toLowerCase();
                    const text = article.querySelector("p").textContent.toLowerCase();
                    const category = article.getAttribute("data-category");

                    const matchesSearch = title.includes(query) || text.includes(query);
                    const matchesCategory = activeCategory === "all" || category === activeCategory;

                    if (matchesSearch && matchesCategory) {
                        article.style.display = "flex";
                    } else {
                        article.style.display = "none";
                    }
                });
            }

            // رویداد کلیک دکمه‌های فیلتر
            filterButtons.forEach(button => {
                button.addEventListener("click", () => {
                    filterButtons.forEach(btn => btn.classList.remove("active"));
                    button.classList.add("active");
                    filterArticles();
                });
            });

            // رویداد تایپ در کادر جستجو
            searchInput.addEventListener("input", filterArticles);
        });
    </script>
</body>
</html>
